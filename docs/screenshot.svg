<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" font-family="'IBM Plex Mono', ui-monospace, 'SF Mono', monospace" role="img" aria-label="Swapscope instrument panel: a live htmx element wired by dashed tracing lines to a network panel and a DOM patch panel">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#254a68" stroke-opacity="0.28" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="640" fill="#0a1826"/>
  <rect width="1200" height="640" fill="url(#grid)"/>

  <!-- wordmark -->
  <text x="40" y="58" font-size="34" font-weight="600" fill="#e8f2fb"><tspan fill="#5ec8f2">&#10216;S&#10217;</tspan>wapscope</text>
  <text x="40" y="86" font-size="15" fill="#7fa1bd">The htmx cheat sheet you watch run.</text>

  <!-- preset bar -->
  <rect x="40" y="110" width="1120" height="56" rx="2" fill="#0f2136" stroke="#254a68"/>
  <text x="64" y="144" font-size="12" fill="#7fa1bd" letter-spacing="1">HX-SWAP</text>
  <rect x="150" y="124" width="96" height="28" rx="2" fill="#15304a" stroke="#254a68"/>
  <text x="162" y="143" font-size="12" fill="#7fa1bd">innerHTML</text>
  <rect x="254" y="124" width="96" height="28" rx="2" fill="#5ec8f2" stroke="#5ec8f2"/>
  <text x="266" y="143" font-size="12" fill="#0a1826" font-weight="600">outerHTML</text>
  <text x="392" y="144" font-size="12" fill="#7fa1bd" letter-spacing="1">HX-TRIGGER</text>
  <rect x="500" y="124" width="60" height="28" rx="2" fill="#5ec8f2" stroke="#5ec8f2"/>
  <text x="516" y="143" font-size="12" fill="#0a1826" font-weight="600">click</text>
  <rect x="568" y="124" width="84" height="28" rx="2" fill="#15304a" stroke="#254a68"/>
  <text x="580" y="143" font-size="12" fill="#7fa1bd">revealed</text>
  <text x="694" y="144" font-size="12" fill="#7fa1bd" letter-spacing="1">HX-TARGET</text>
  <rect x="792" y="124" width="52" height="28" rx="2" fill="#5ec8f2" stroke="#5ec8f2"/>
  <text x="808" y="143" font-size="12" fill="#0a1826" font-weight="600">self</text>
  <rect x="1024" y="124" width="112" height="28" rx="2" fill="none" stroke="#f2a65e"/>
  <text x="1042" y="143" font-size="12" fill="#f2a65e">&#8681; compare</text>

  <!-- live element zone -->
  <rect x="40" y="190" width="420" height="410" rx="2" fill="#0f2136" stroke="#254a68"/>
  <rect x="40" y="190" width="420" height="410" fill="url(#grid)"/>
  <text x="60" y="216" font-size="12" fill="#7fa1bd" letter-spacing="1">LIVE ELEMENT</text>
  <!-- the button, mid-flash (amber) -->
  <rect x="110" y="350" width="280" height="70" rx="2" fill="#15304a" stroke="#f2a65e" stroke-width="2"/>
  <rect x="106" y="346" width="288" height="78" rx="4" fill="none" stroke="#f2a65e" stroke-opacity="0.25" stroke-width="2"/>
  <text x="250" y="382" font-size="13" fill="#e8f2fb" text-anchor="middle">Request #7 handled by</text>
  <text x="250" y="402" font-size="13" fill="#5ec8f2" text-anchor="middle">outerHTML &#8594; self</text>

  <!-- network panel -->
  <rect x="560" y="190" width="600" height="196" rx="2" fill="#0f2136" stroke="#254a68"/>
  <rect x="560" y="190" width="600" height="196" fill="url(#grid)"/>
  <text x="580" y="216" font-size="12" fill="#7fa1bd" letter-spacing="1">REQUEST &#8594;</text>
  <text x="580" y="250" font-size="12" fill="#7fa1bd">METHOD</text>
  <text x="700" y="250" font-size="12" fill="#e8f2fb">GET</text>
  <text x="580" y="274" font-size="12" fill="#7fa1bd">URL</text>
  <text x="700" y="274" font-size="12" fill="#e8f2fb">api/demo?swap=outerHTML&amp;target=self</text>
  <text x="580" y="298" font-size="12" fill="#7fa1bd">STATUS</text>
  <rect x="700" y="286" width="44" height="18" rx="9" fill="none" stroke="#5ef2a6"/>
  <text x="710" y="299" font-size="12" fill="#5ef2a6">200</text>
  <text x="580" y="330" font-size="11" fill="#7fa1bd" letter-spacing="1">RESPONSE BODY</text>
  <rect x="580" y="340" width="560" height="34" rx="2" fill="#15304a" stroke="#254a68"/>
  <text x="592" y="361" font-size="11" fill="#e8f2fb">&lt;button id="demo-el" data-gen="7" hx-get="api/demo?..." hx-swap="outerHTML"&gt;</text>

  <!-- DOM patch panel -->
  <rect x="560" y="404" width="600" height="196" rx="2" fill="#0f2136" stroke="#254a68"/>
  <rect x="560" y="404" width="600" height="196" fill="url(#grid)"/>
  <text x="580" y="430" font-size="12" fill="#7fa1bd" letter-spacing="1">PATCH &#8594;</text>
  <rect x="580" y="446" width="560" height="134" rx="2" fill="#15304a" stroke="#254a68"/>
  <rect x="592" y="462" width="536" height="26" rx="2" fill="#f2a65e" fill-opacity="0.35"/>
  <text x="600" y="480" font-size="12" fill="#f2a65e">&lt;button id="demo-el" data-gen="7" ...&gt;</text>
  <text x="612" y="508" font-size="12" fill="#e8f2fb">&lt;span class="demo-el__label" data-gen="7"&gt;</text>
  <text x="624" y="530" font-size="12" fill="#7fa1bd">Request #7 handled by outerHTML &#8594; self</text>
  <text x="612" y="552" font-size="12" fill="#e8f2fb">&lt;/span&gt;</text>
  <text x="600" y="574" font-size="12" fill="#f2a65e">&lt;/button&gt;</text>

  <!-- dashed tracing connectors -->
  <line x1="394" y1="372" x2="560" y2="288" stroke="#5ec8f2" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="394" y1="392" x2="560" y2="500" stroke="#5ec8f2" stroke-width="2" stroke-dasharray="6 5"/>
  <circle cx="560" cy="288" r="4" fill="#5ec8f2"/>
  <circle cx="560" cy="500" r="4" fill="#5ec8f2"/>
</svg>
