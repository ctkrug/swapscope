name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (Go)
        run: go test -race ./...

      - name: Test (JS)
        run: node --test static/js/*.test.mjs

      - name: Gofmt check
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "gofmt needs to be run on:"
            echo "$fmt_out"
            exit 1
          fi
